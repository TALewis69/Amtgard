<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amtgard Unit Auditor</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --primary: #2ecc71; --bg: #121212; --card: #1e1e1e; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: 40px auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #333; }
        h1 { color: var(--primary); margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .controls { display: flex; gap: 10px; margin: 25px 0; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2c2c2c; color: white; }
        button { padding: 12px 24px; border-radius: 6px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: bold; }
        #status { color: #f1c40f; margin-bottom: 15px; display: none; padding: 15px; border-left: 4px solid #f1c40f; background: rgba(241, 196, 15, 0.1); }
        table { width: 100%; border-collapse: collapse; background: #252525; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #383838; }
        th { background: #333; color: var(--primary); text-transform: uppercase; font-size: 0.75rem; }
        .active { color: var(--primary); font-weight: bold; }
        .mia { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚔️ Amtgard Unit Auditor</h1>
    <div class="controls">
        <input type="number" id="unitId" placeholder="Enter Unit ID (e.g., 47)">
        <button id="runBtn">Generate Roster</button>
    </div>
    <div id="status">📡 Connecting via Google Proxy...</div>
    <table id="reportTable" style="display:none;">
        <thead>
            <tr>
                <th>Persona</th>
                <th>Role</th>
                <th>Credits</th>
                <th>Last Seen</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="reportBody"></tbody>
    </table>
</div>

<script>
    // Using 'var' for maximum compatibility to avoid 'const' syntax errors
    var PROXY_URL = "https://script.google.com/macros/s/AKfycbyiqB5ORyCjLxKQwvMVd21GcSolpJOrYHYX63cg6AGfEoC7xQpWNgXli0-mnzy8e_Qj/exec";

    async function orkCall(callPath, params) {
        var queryParams = params || "";
        var orkUrl = "https://ork.amtgard.com/orkinterface/api/api.php?call=" + callPath + queryParams + "&ts=" + Date.now();
        var finalUrl = PROXY_URL + "?url=" + encodeURIComponent(orkUrl);

        var response = await fetch(finalUrl);
        return await response.json();
    }

    document.getElementById('runBtn').addEventListener('click', async function() {
        var id = document.getElementById('unitId').value;
        var status = document.getElementById('status');
        var tbody = document.getElementById('reportBody');
        var table = document.getElementById('reportTable');

        if (!id) return alert("Please enter a Unit ID.");
        if (PROXY_URL.indexOf("YOUR_GOOGLE_SCRIPT") !== -1) return alert("Paste your Google Script URL into the code!");
        
        status.style.display = 'block';
        status.innerText = "📡 Fetching roster data...";
        table.style.display = 'none';
        tbody.innerHTML = '';

        try {
            var rosterData = await orkCall("Unit/GetUnitRoster", "&request[UnitId]=" + id);
            if (!rosterData || !rosterData.Roster) throw new Error("Unit not found.");

            var members = rosterData.Roster;
            var ninetyDaysAgo = new Date();
            ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);

            for (var i = 0; i < members.length; i++) {
                var m = members[i];
                try {
                    var attData = await orkCall("Player/GetAttendance", "&request[MundaneId]=" + m.MundaneId);
                    var attendance = attData.Attendance || [];
                    var lastDate = attendance.length > 0 ? attendance[0].Date : "No Record";
                    
                    var isActive = false;
                    for (var j = 0; j < attendance.length; j++) {
                        if (new Date(attendance[j].Date) > ninetyDaysAgo) {
                            isActive = true;
                            break;
                        }
                    }

                    var row = '<tr>' +
                        '<td><strong>' + (m.Persona || 'Unknown') + '</strong></td>' +
                        '<td>' + (m.UnitRole || 'Member') + '</td>' +
                        '<td>' + attendance.length + '</td>' +
                        '<td>' + lastDate + '</td>' +
                        '<td class="' + (isActive ? 'active' : 'mia') + '">' + (isActive ? 'ACTIVE' : 'MIA') + '</td>' +
                    '</tr>';
                    tbody.insertAdjacentHTML('beforeend', row);
                } catch (err) {
                    console.warn("Skipped a player.");
                }
            }
            status.style.display = 'none';
            table.style.display = 'table';
        } catch (e) {
            status.innerHTML = "❌ Error: " + e.message;
        }
    });
</script>

</body>
</html>
