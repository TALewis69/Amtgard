<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amtgard Unit Auditor</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: #eee; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #333; }
        h1 { color: #2ecc71; margin-top: 0; }
        .controls { display: flex; gap: 10px; margin: 20px 0; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2c2c2c; color: white; }
        button { padding: 12px 24px; border-radius: 6px; border: none; background: #2ecc71; color: white; cursor: pointer; font-weight: bold; }
        #status { color: #f1c40f; margin-bottom: 15px; display: none; padding: 10px; background: rgba(241, 196, 15, 0.1); border-left: 4px solid #f1c40f; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #2ecc71; text-transform: uppercase; font-size: 0.8rem; }
        .active { color: #2ecc71; font-weight: bold; }
        .mia { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚔️ Amtgard Unit Auditor</h1>
    <div class="controls">
        <input type="number" id="unitId" placeholder="Enter Unit ID (e.g., 47)">
        <button id="runBtn">Generate Roster</button>
    </div>
    <div id="status">📡 Connecting to Google Bridge...</div>
    <table id="reportTable" style="display:none;">
        <thead>
            <tr>
                <th>Persona</th>
                <th>Role</th>
                <th>Credits</th>
                <th>Last Seen</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="reportBody"></tbody>
    </table>
</div>

<script>
    // MAKE SURE THIS IS YOUR NEW DEPLOYMENT URL
    var PROXY_URL = "https://script.google.com/macros/s/AKfycbyiqB5ORyCjLxKQwvMVd21GcSolpJOrYHYX63cg6AGfEoC7xQpWNgXli0-mnzy8e_Qj/exec";

    function orkCall(callPath, params, callback) {
        var orkUrl = "https://ork.amtgard.com/orkinterface/api/api.php?call=" + callPath + params + "&ts=" + Date.now();
        var finalUrl = PROXY_URL + "?url=" + encodeURIComponent(orkUrl);

        // Using jQuery ajax as it handles redirects better for Google Scripts
        $.ajax({
            url: finalUrl,
            method: 'GET',
            dataType: 'json',
            success: function(data) {
                callback(data);
            },
            error: function(xhr) {
                console.error("Proxy Error:", xhr);
                document.getElementById('status').innerHTML = "❌ Google Proxy Error (403). Check your Deployment 'Who has access' setting.";
            }
        });
    }

    document.getElementById('runBtn').onclick = function() {
        var id = document.getElementById('unitId').value;
        var status = document.getElementById('status');
        var tbody = document.getElementById('reportBody');
        
        if (!id) return alert("Please enter a Unit ID.");
        if (PROXY_URL.indexOf("YOUR_NEW_DEPLOY") !== -1) return alert("Please paste your Google Script URL.");

        status.style.display = 'block';
        status.innerText = "📡 Accessing ORK via Google Bridge...";
        tbody.innerHTML = "";

        orkCall("Unit/GetUnitRoster", "&request[UnitId]=" + id, function(data) {
            if (!data || !data.Roster) {
                status.innerText = "❌ Unit not found.";
                return;
            }

            var members = data.Roster;
            var ninetyDaysAgo = new Date();
            ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);

            var processMember = function(idx) {
                if (idx >= members.length) {
                    status.style.display = 'none';
                    document.getElementById('reportTable').style.display = 'table';
                    return;
                }

                var m = members[idx];
                orkCall("Player/GetAttendance", "&request[MundaneId]=" + m.MundaneId, function(attData) {
                    var attendance = attData.Attendance || [];
                    var lastDate = attendance.length > 0 ? attendance[0].Date : "No Record";
                    
                    var isActive = false;
                    for (var i = 0; i < attendance.length; i++) {
                        if (new Date(attendance[i].Date) > ninetyDaysAgo) {
                            isActive = true;
                            break;
                        }
                    }

                    var row = "<tr>" +
                        "<td><strong>" + m.Persona + "</strong></td>" +
                        "<td>" + (m.UnitRole || 'Member') + "</td>" +
                        "<td>" + attendance.length + "</td>" +
                        "<td>" + lastDate + "</td>" +
                        "<td class='" + (isActive ? "active" : "mia") + "'>" + (isActive ? "ACTIVE" : "MIA") + "</td>" +
                    "</tr>";
                    
                    tbody.insertAdjacentHTML('beforeend', row);
                    processMember(idx + 1);
                });
            };

            processMember(0);
        });
    };
</script>

</body>
</html>
