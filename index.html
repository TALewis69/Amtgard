<script>
    https://script.google.com/macros/s/AKfycbyiqB5ORyCjLxKQwvMVd21GcSolpJOrYHYX63cg6AGfEoC7xQpWNgXli0-mnzy8e_Qj/exec
    const PROXY_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE";

    async function orkCall(callPath, params = "") {
        const orkUrl = `https://ork.amtgard.com/orkinterface/api/api.php?call=${callPath}${params}&ts=${Date.now()}`;
        const finalUrl = `${PROXY_URL}?url=${encodeURIComponent(orkUrl)}`;

        const response = await fetch(finalUrl);
        return await response.json();
    }

    document.getElementById('runBtn').addEventListener('click', async () => {
        const id = document.getElementById('unitId').value;
        const status = document.getElementById('status');
        const tbody = document.getElementById('reportBody');
        const table = document.getElementById('reportTable');

        if (!id) return alert("Please enter a Unit ID.");
        
        status.style.display = 'block';
        status.innerText = "📡 Using Private Bridge to ORK... (This is much more reliable)";
        table.style.display = 'none';
        tbody.innerHTML = '';

        try {
            const rosterData = await orkCall("Unit/GetUnitRoster", `&request[UnitId]=${id}`);
            if (!rosterData.Roster) throw new Error("Unit not found.");

            for (let m of rosterData.Roster) {
                try {
                    const attData = await orkCall("Player/GetAttendance", `&request[MundaneId]=${m.MundaneId}`);
                    const attendance = attData.Attendance || [];
                    const ninetyDaysAgo = new Date();
                    ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);
                    
                    const lastDate = attendance.length > 0 ? attendance[0].Date : "No Record";
                    const isActive = attendance.some(a => new Date(a.Date) > ninetyDaysAgo);

                    tbody.insertAdjacentHTML('beforeend', `
                        <tr>
                            <td><strong>${m.Persona}</strong></td>
                            <td>${m.UnitRole || 'Member'}</td>
                            <td>${attendance.length}</td>
                            <td>${lastDate}</td>
                            <td class="${isActive ? 'active' : 'mia'}">${isActive ? 'ACTIVE' : 'MIA'}</td>
                        </tr>
                    `);
                } catch (e) { console.warn("Player skip"); }
            }
            status.style.display = 'none';
            table.style.display = 'table';
        } catch (e) {
            status.innerHTML = `❌ Error: ${e.message}. Did you set the Google Script to 'Anyone' access?`;
        }
    });
</script>
