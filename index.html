<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amtgard Unit Activity Auditor</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --primary: #2ecc71; --bg: #121212; --card: #1e1e1e; --text: #eee; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .controls { display: flex; gap: 10px; margin: 20px 0; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2c2c2c; color: white; font-size: 1rem; }
        button { padding: 12px 24px; border-radius: 6px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #27ae60; }
        #status { color: #f1c40f; margin-bottom: 15px; display: none; font-style: italic; background: rgba(241, 196, 15, 0.1); padding: 10px; border-left: 4px solid #f1c40f; }
        table { width: 100%; border-collapse: collapse; background: #252525; margin-top: 20px; font-size: 0.95em; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #383838; }
        th { background: #333; color: var(--primary); text-transform: uppercase; font-size: 0.8rem; }
        .active { color: var(--primary); font-weight: bold; }
        .mia { color: #e74c3c; }
        tr:hover { background: #2d2d2d; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚔️ Unit Activity Auditor</h1>
    <p>Live roster generation and 90-day attendance tracking.</p>
    
    <div class="controls">
        <input type="number" id="unitId" placeholder="Enter Unit ID (e.g., 47)">
        <button id="runBtn">Generate Report</button>
    </div>

    <div id="status">📡 Establishing connection to the ORK archives...</div>

    <table id="reportTable" style="display:none;">
        <thead>
            <tr>
                <th>Persona</th>
                <th>Role</th>
                <th>Total Credits</th>
                <th>Last Date</th>
                <th>90-Day Status</th>
            </tr>
        </thead>
        <tbody id="reportBody"></tbody>
    </table>
</div>

<script>
    const API_BASE = "https://ork.amtgard.com/orkinterface/api/api.php?call=";

    /**
     * ORK API CALLER
     * Uses allorigins.win to bypass CORS and CORB.
     * The proxy wraps the response in a 'contents' string which we parse.
     */
    async function orkCall(callPath, params = "") {
        const url = `${API_BASE}${callPath}${params}&ts=${Date.now()}`;
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error("Proxy Server Error");
        
        const wrapper = await response.json();
        if (!wrapper.contents) throw new Error("No data received from proxy.");
        
        return JSON.parse(wrapper.contents);
    }

    document.getElementById('runBtn').addEventListener('click', async () => {
        const id = document.getElementById('unitId').value;
        const status = document.getElementById('status');
        const tbody = document.getElementById('reportBody');
        const table = document.getElementById('reportTable');

        if (!id) return alert("Please enter a Unit ID.");
        
        // Reset UI
        status.style.display = 'block';
        status.innerText = "📡 Requesting data from the ORK archives...";
        table.style.display = 'none';
        tbody.innerHTML = '';

        try {
            // STEP 1: Fetch the Roster
            const rosterResponse = await orkCall("Unit/GetUnitRoster", `&request[UnitId]=${id}`);
            
            if (!rosterResponse || !rosterResponse.Roster || rosterResponse.Roster.length === 0) {
                throw new Error("Unit not found or Roster is empty.");
            }
