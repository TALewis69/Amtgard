<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORK Player Lookup</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-top: 40px; }
        .search-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .result { border-top: 1px solid #eee; padding-top: 20px; display: none; }
        .label { font-size: 11px; text-transform: uppercase; color: #888; font-weight: bold; display: block; }
        .value { font-size: 18px; color: #333; display: block; margin-bottom: 12px; }
        #status-msg { text-align: center; font-size: 12px; margin-top: 10px; color: #666; font-family: monospace; white-space: pre-wrap; overflow-wrap: break-word; }
    </style>
</head>
<body>

<div class="card">
    <h3>ORK Player Search</h3>
    <div class="search-group">
        <input type="number" id="idInput" value="43232">
        <button id="searchBtn" onclick="fetchPlayer()">Search</button>
    </div>
    
    <div id="status-msg">Ready.</div>

    <div id="resultBox" class="result">
        <span class="label">Persona</span>
        <span id="persona" class="value"></span>
        <span class="label">Park</span>
        <span id="park" class="value"></span>
        <span class="label">Kingdom</span>
        <span id="kingdom" class="value"></span>
    </div>
</div>

<script>
    async function fetchPlayer() {
        const id = document.getElementById('idInput').value;
        const resultBox = document.getElementById('resultBox');
        const status = document.getElementById('status-msg');
        const btn = document.getElementById('searchBtn');

        resultBox.style.display = 'none';
        btn.disabled = true;
        status.textContent = "Connecting to ORK via Proxy...";
        status.style.color = "#007bff";

        const orkUrl = `https://ork.amtgard.com/orkinterface/api/index.php?call=Player/GetPlayerSummary&request[MundaneId]=${id}`;
        
        // SWITCHED PROXY: Using corsproxy.io instead of AllOrigins
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(orkUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            const text = await response.text(); // Get raw text first to check if it's HTML or JSON

            if (text.trim().startsWith("<!DOCTYPE")) {
                throw new Error("The ORK blocked the request with a security page. Try again in 5 minutes.");
            }

            const data = JSON.parse(text);

            if (data && data.Status && data.Status.Status === 0) {
                const p = data.Player;
                document.getElementById('persona').textContent = p.Persona || "No Persona";
                document.getElementById('park').textContent = p.ParkName || "No Park";
                document.getElementById('kingdom').textContent = p.KingdomName || "No Kingdom";
                
                status.style.display = 'none';
                resultBox.style.display = 'block';
            } else {
                throw new Error("ORK Error: " + (data.Status ? data.Status.ErrorMsg : "Unknown"));
            }
        } catch (err) {
            console.error(err);
            status.style.color = "red";
            status.textContent = "Search Failed: " + err.message;
        } finally {
            btn.disabled = false;
        }
    }

    document.getElementById('idInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchPlayer();
    });
</script>
</body>
</html>
