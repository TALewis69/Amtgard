<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORK Player Lookup</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script src="https://kenwalker.github.io/jsork/jsork.js"></script>

    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 70%; padding: 8px; margin-bottom: 10px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        .result { margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; display: none; }
        .error { color: red; font-size: 0.9em; margin-top: 10px; display: none; }
        #debug-log { background: #333; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 20px; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h3>Amtgard Player Search</h3>
    <input type="number" id="idInput" value="43232">
    <button onclick="fetchPlayer()">Search</button>
    
    <div id="errorBox" class="error"></div>

    <div id="resultBox" class="result">
        <p><strong>Persona:</strong> <span id="persona"></span></p>
        <p><strong>Park:</strong> <span id="park"></span></p>
    </div>

    <div id="debug-log"></div>
</div>

<script>
    async function fetchPlayer() {
        const id = document.getElementById('idInput').value;
        const resultBox = document.getElementById('resultBox');
        const errorBox = document.getElementById('errorBox');
        const debugLog = document.getElementById('debug-log');

        // Reset UI
        resultBox.style.display = 'none';
        errorBox.style.display = 'none';
        debugLog.style.display = 'block';
        debugLog.textContent = "Connecting to Proxy...";

        // The Amtgard API URL
        const targetUrl = `https://ork.amtgard.com/orkinterface/api/index.php?call=Player/GetPlayerSummary&request[MundaneId]=${id}`;
        
        // The Proxy URL to bypass CORS/Security blocks
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            const json = await response.json();
            
            // The proxy wraps the real data inside a 'contents' string
            const playerResponse = JSON.parse(json.contents);
            
            debugLog.textContent = "Data Received!";

            if (playerResponse && playerResponse.Status && playerResponse.Status.Status === 0) {
                const player = playerResponse.Player;
                
                document.getElementById('persona').textContent = player.Persona || "No Persona";
                document.getElementById('park').textContent = player.ParkName || "No Park Found";
                
                resultBox.style.display = 'block';
                debugLog.style.display = 'none';
            } else {
                throw new Error("Player ID " + id + " not found.");
            }
        } catch (err) {
            errorBox.textContent = "Search failed: " + err.message;
            errorBox.style.display = 'block';
            debugLog.textContent = "Error Log: " + err.message;
            console.error(err);
        }
    }
</script>

</body>
</html>
