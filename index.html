<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORK Player Lookup</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-top: 40px; }
        .search-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .result { border-top: 1px solid #eee; padding-top: 20px; display: none; }
        .label { font-size: 11px; text-transform: uppercase; color: #888; font-weight: bold; display: block; }
        .value { font-size: 18px; color: #333; display: block; margin-bottom: 12px; }
        #status-msg { text-align: center; font-size: 13px; margin-top: 10px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h3>ORK Player Search</h3>
    <div class="search-group">
        <input type="number" id="idInput" value="43232">
        <button id="searchBtn" onclick="fetchPlayer()">Search</button>
    </div>
    
    <div id="status-msg">Ready.</div>

    <div id="resultBox" class="result">
        <span class="label">Persona</span>
        <span id="persona" class="value"></span>
        <span class="label">Park</span>
        <span id="park" class="value"></span>
        <span class="label">Kingdom</span>
        <span id="kingdom" class="value"></span>
    </div>
</div>

<script>
    function fetchPlayer() {
        const id = $('#idInput').val();
        const $status = $('#status-msg');
        const $btn = $('#searchBtn');
        const $result = $('#resultBox');

        $result.hide();
        $btn.prop('disabled', true);
        $status.text("Requesting via JSONP (Bypassing CORS)...").css('color', '#007bff');

        // We use jQuery's AJAX with 'jsonp' datatype. 
        // This tells the ORK to wrap the response in a function call, 
        // which the browser accepts as a standard script.
        $.ajax({
            url: "https://ork.amtgard.com/orkinterface/api/index.php",
            dataType: "jsonp",
            data: {
                call: "Player/GetPlayerSummary",
                request: { MundaneId: id }
            },
            success: function(data) {
                if (data && data.Status && data.Status.Status === 0) {
                    $('#persona').text(data.Player.Persona || "No Persona");
                    $('#park').text(data.Player.ParkName || "No Park");
                    $('#kingdom').text(data.Player.KingdomName || "No Kingdom");
                    
                    $status.hide();
                    $result.show();
                } else {
                    $status.text("Error: Player ID not found.").css('color', 'red').show();
                }
            },
            error: function(xhr, status, error) {
                $status.text("Security Block: The ORK is refusing connections from GitHub.").css('color', 'red').show();
                console.error("Error Detail:", error);
            },
            complete: function() {
                $btn.prop('disabled', false);
            }
        });
    }

    // Support Enter key
    $('#idInput').on('keypress', function(e) {
        if (e.which === 13) fetchPlayer();
    });
</script>
</body>
</html>
