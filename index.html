<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amtgard Unit Auditor (Bypass Version)</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #1a1a1a; color: #eee; }
        .container { max-width: 900px; margin: auto; background: #252525; padding: 20px; border-radius: 10px; border: 1px solid #444; }
        input { padding: 10px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ecc71; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #2d2d2d; }
        th, td { padding: 12px; border: 1px solid #444; text-align: left; }
        th { background: #111; color: #27ae60; }
        .loading { color: #f1c40f; display: none; margin: 15px 0; }
        .status-active { color: #2ecc71; font-weight: bold; }
        .status-mia { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>Unit Roster & Attendance Auditor</h2>
    <p>Enter the <strong>Unit ID</strong> (e.g., 52815) to pull live data from the ORK:</p>
    
    <input type="number" id="unitId" placeholder="Unit ID">
    <button id="runBtn">Generate Report</button>

    <div id="loader" class="loading">📡 Connecting to ORK via Proxy... (Large units may take 30s)</div>

    <table id="reportTable" style="display:none;">
        <thead>
            <tr>
                <th>Persona</th>
                <th>Role</th>
                <th>90-Day Credits</th>
                <th>Last Seen</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="reportBody"></tbody>
    </table>
</div>

<script>
// This "intercepts" jsork's calls and routes them through a proxy
const originalFetch = window.fetch;
window.fetch = function() {
    let url = arguments[0];
    if (typeof url === 'string' && url.includes('amtgard.com')) {
        arguments[0] = "https://corsproxy.io/?url=" + encodeURIComponent(url);
    }
    return originalFetch.apply(this, arguments);
};

    // --- LOAD JSORK DYNAMICALLY ---
    const loadJsork = () => {
        return new Promise((resolve) => {
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/gh/Deitrick/jsork/jsork.js";
            script.onload = () => resolve();
            document.head.appendChild(script);
        });
    };

    document.getElementById('runBtn').addEventListener('click', async () => {
        const id = document.getElementById('unitId').value;
        const loader = document.getElementById('loader');
        const tbody = document.getElementById('reportBody');
        const table = document.getElementById('reportTable');

        if (!id) return alert("Please enter a Unit ID");

        loader.style.display = 'block';
        table.style.display = 'none';
        tbody.innerHTML = '';

        try {
            await loadJsork(); // Ensure jsork is ready
            
            const members = await jsork.unit.getUnitPlayers(id);
            const ninetyDaysAgo = new Date();
            ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);

            for (let m of members) {
                const attendance = await jsork.player.getAttendance(m.MundaneId);
                const recent = attendance.filter(a => new Date(a.Date) > ninetyDaysAgo);
                const lastDate = attendance.length > 0 ? attendance[0].Date : "Never";
                const isActive = recent.length > 0;

                const row = `<tr>
                    <td><strong>${m.Persona}</strong></td>
                    <td>${m.UnitRole || 'Member'}</td>
                    <td>${recent.length}</td>
                    <td>${lastDate}</td>
                    <td class="${isActive ? 'status-active' : 'status-mia'}">${isActive ? 'ACTIVE' : 'MIA'}</td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            }

            loader.style.display = 'none';
            table.style.display = 'table';
        } catch (e) {
            console.error(e);
            loader.innerHTML = "❌ Error: Could not reach ORK. The Unit ID might be wrong or the proxy is down.";
        }
    });
</script>

</body>
</html>
