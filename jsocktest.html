<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORK Player Lookup</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .profile-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; max-width: 300px; }
        .label { font-weight: bold; color: #555; }
        #status { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <h2>Amtgard Player Info</h2>
    <div id="status">Loading player data...</div>
    
    <div class="profile-card" id="player-info" style="display: none;">
        <p><span class="label">Persona:</span> <span id="persona"></span></p>
        <p><span class="label">Park:</span> <span id="park"></span></p>
    </div>

    <script src="https://library.amtgard.com/jsork.js"></script>

    <script>
        const PLAYER_ID = 52815;

        async function displayPlayer(id) {
            const statusEl = document.getElementById('status');
            const infoEl = document.getElementById('player-info');

            try {
                // Using the jsork library to fetch data
                const player = await jsork.player.getPlayerSummary(id);
                
                // Update the DOM
                document.getElementById('persona').textContent = player.Persona;
                document.getElementById('park').textContent = player.ParkName;

                // Toggle visibility
                statusEl.style.display = 'none';
                infoEl.style.display = 'block';
                
                console.log("Player Data:", player);
            } catch (error) {
                statusEl.textContent = "Error loading player. Check console for details.";
                console.error("jsork Error:", error);
            }
        }

        // Run the function when the page loads
        window.onload = () => displayPlayer(PLAYER_ID);
    </script>
</body>
</html>
