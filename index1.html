<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amtgard Player Lookup</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script src="https://kenwalker.github.io/jsork/jsork.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f6; display: flex; justify-content: center; }
        .container { max-width: 400px; width: 100%; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 50px; }
        h2 { margin-top: 0; text-align: center; color: #2c3e50; }
        .search-box { display: flex; gap: 8px; margin: 20px 0; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 0.9rem; text-align: center; margin-bottom: 10px; color: #666; font-weight: bold; }
        .info-card { background: #fafafa; border: 1px solid #eee; padding: 20px; border-radius: 10px; display: none; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: #95a5a6; font-weight: bold; display: block; margin-top: 12px; }
        .value { font-size: 1.1rem; color: #2c3e50; display: block; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>ORK Player Lookup</h2>
    
    <div class="search-box">
        <input type="number" id="playerID" value="43232">
        <button id="searchBtn" onclick="lookup()" disabled>Wait...</button>
    </div>

    <div id="status">Initializing Library...</div>

    <div id="output" class="info-card">
        <span class="label">Persona</span>
        <span id="p-name" class="value"></span>
        <span class="label">Park</span>
        <span id="p-park" class="value"></span>
        <span class="label">Kingdom</span>
        <span id="p-kingdom" class="value"></span>
    </div>
</div>

<script>
    // --- THE SAFETY WAITER ---
    // This checks every 500ms to see if 'jsork' is defined before letting you click Search
    const initCheck = setInterval(() => {
        if (typeof jsork !== 'undefined') {
            clearInterval(initCheck);
            const btn = document.getElementById('searchBtn');
            const status = document.getElementById('status');
            btn.disabled = false;
            btn.textContent = "Search";
            status.textContent = "System Ready";
            status.style.color = "#28a745";
            setTimeout(() => { status.style.display = 'none'; }, 2000);
        }
    }, 500);

    async function lookup() {
        const id = document.getElementById('playerID').value;
        const out = document.getElementById('output');
        const status = document.getElementById('status');
        const btn = document.getElementById('searchBtn');

        // Double check library state
        if (typeof jsork === 'undefined') {
            alert("Error: The ORK library failed to load. Check your internet connection.");
            return;
        }

        out.style.display = 'none';
        status.style.display = 'block';
        status.textContent = "Connecting to ORK...";
        status.style.color = "#007bff";
        btn.disabled = true;

        try {
            // Get player summary
            const player = await jsork.player.getPlayerSummary(id);
